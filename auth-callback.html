<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Signing in…</title></head>
<body>
<script>
// No CloudKit here — we just relay the token to the parent window.
// The parent's CloudKit instance processes it via setUpAuth().
const hash = window.location.hash;
if (hash.includes('ckWebAuthToken')) {
  // BroadcastChannel works even when Safari nullifies window.opener
  // after cross-origin popup navigation (cdn.apple-cloudkit.com → appleid.apple.com → here)
  try { const ch = new BroadcastChannel('ck-auth'); ch.postMessage({ type: 'ck-relay', hash }); ch.close(); } catch (_) {}
  // postMessage as fallback when opener is still available
  try { if (window.opener) window.opener.postMessage({ type: 'ck-relay', hash }, 'https://ucm.thothi.app'); } catch(_) {}
}
setTimeout(() => window.close(), 300);
</script>
</body>
</html>
